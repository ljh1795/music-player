      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      
      - name: Generate playlist.json
        run: |
          python3 << 'PYTHON'
          import os, json, urllib.parse, subprocess

          songs_dir = "songs"
          playlist = []

          for filename in sorted(os.listdir(songs_dir)):
              if not filename.endswith(".mp3"):
                  continue
              
              filepath = os.path.join(songs_dir, filename)
              
              # 用 ffprobe 获取时长
              try:
                  result = subprocess.run([
                      "ffprobe", "-v", "error", "-show_entries", 
                      "format=duration", "-of", "default=noprint_wrappers=1:nokey=1",
                      filepath
                  ], capture_output=True, text=True, timeout=10)
                  duration_sec = float(result.stdout.strip())
                  mins = int(duration_sec // 60)
                  secs = int(duration_sec % 60)
                  duration = str(mins) + ":" + (str(secs) if secs >= 10 else "0" + str(secs))
              except:
                  duration = "0:00"
              
              name = filename[:-4]
              if " - " in name:
                  parts = name.split(" - ", 1)
                  artist = parts[0]
                  title = parts[1]
              else:
                  title = name
                  artist = "未知歌手"
              
              urlfile = urllib.parse.quote(filename)
              
              playlist.append({
                  "title": title,
                  "artist": artist,
                  "url": "https://ljh1795.github.io/music-player/songs/" + urlfile,
                  "duration": duration
              })

          with open("playlist.json", "w", encoding="utf-8") as f:
              json.dump(playlist, f, ensure_ascii=False, indent=2)
          PYTHON
