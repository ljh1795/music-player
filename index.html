<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>音乐播放器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: white; }
        .song-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; }
        .song-item:hover { background: #333; }
    </style>
</head>
<body>
    <h1>🎵 音乐播放器</h1>
    <div id="songList">加载中...</div>

    <script>
        async function loadPlaylist() {
            try {
                const response = await fetch('playlist.json?t=' + Date.now());
                const playlist = await response.json();
                
                const list = document.getElementById('songList');
                if (playlist.length === 0) {
                    list.innerHTML = '暂无歌曲';
                    return;
                }
                
                list.innerHTML = playlist.map((song, i) => 
                    `<div class="song-item" onclick="play('${song.url}')">
                        ${i+1}. ${song.title} - ${song.artist} (${song.duration})
                     </div>`
                ).join('');
            } catch (err) {
                document.getElementById('songList').innerHTML = '加载失败: ' + err.message;
                console.error(err);
            }
        }
        
        function play(url) {
            const audio = new Audio(url);
            audio.play().catch(e => alert('播放失败: ' + e.message));
        }
        
        loadPlaylist();
    </script>
</body>
</html>
